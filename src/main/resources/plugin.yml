name: Andaluh
main: com.xexuu.andaluh.AndaluhPlugin
version: ${project.version}
api-version: "1.21"
description: "Transcribe Spanish chat to Andaluh (EPA)"
author: xexuu
commands:
  andaluh:
    description: "Enable or configure Andaluh chat transcription"
    usage: "/andaluh on|off | /andaluh modo <estandar|ceceo|seseo|heheo> | /andaluh test <texto>"
    aliases: [epa]
permissions:
  andaluh.use:
    description: "Use the /andaluh command and chat transcription"
    default: true
